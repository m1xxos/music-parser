openapi: 3.1.0
info:
  title: Music Parser API Contract
  version: 1.1.0
servers:
  - url: http://localhost:8000
paths:
  /api/v1/jobs:
    post:
      summary: Create a new parse job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobResponse'
  /api/v1/jobs/{jobId}:
    get:
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Current job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
  /api/v1/jobs/{jobId}/events:
    get:
      operationId: streamJobEvents
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/jobs/{jobId}/result:
    get:
      operationId: getJobResult
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Result payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultResponse'
  /api/v1/downloads/{jobId}:
    get:
      operationId: downloadJobArtifact
      parameters:
        - $ref: '#/components/parameters/JobId'
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MP3 file stream
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
  /api/v1/history:
    get:
      operationId: getHistory
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recent jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryEntry'
  /api/v1/presets:
    post:
      operationId: createPreset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresetCreateRequest'
      responses:
        '201':
          description: Preset created
    get:
      operationId: listPresets
      responses:
        '200':
          description: Preset list
  /api/v1/presets/{presetId}/apply:
    post:
      operationId: applyPreset
      parameters:
        - in: path
          name: presetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preset payload
  /api/v1/batch:
    post:
      operationId: submitBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
      responses:
        '202':
          description: Batch accepted
components:
  parameters:
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateJobRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        trim:
          $ref: '#/components/schemas/TrimRange'
        metadata:
          $ref: '#/components/schemas/MetadataInput'
    CreateJobResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
    JobStatusResponse:
      type: object
      required: [jobId, status, progressPercent, statusMessage]
      properties:
        jobId:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        progressPercent:
          type: integer
        statusMessage:
          type: string
        updatedAt:
          type: string
          format: date-time
    ResultResponse:
      type: object
      required: [jobId, status, output]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [completed]
        output:
          $ref: '#/components/schemas/OutputArtifact'
    HistoryEntry:
      type: object
      required: [jobId, status, summary, updatedAt]
      properties:
        jobId:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
    TrimRange:
      type: object
      properties:
        startSeconds:
          type: number
          minimum: 0
        endSeconds:
          type: number
          minimum: 0
    MetadataInput:
      type: object
      properties:
        title: { type: string }
        artist: { type: string }
        album: { type: string }
    OutputArtifact:
      type: object
      required: [filename, format, sizeBytes, downloadUrl]
      properties:
        filename: { type: string }
        format:
          type: string
          enum: [mp3]
        sizeBytes: { type: integer, minimum: 1 }
        downloadUrl: { type: string, format: uri }
    PresetCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        trim_start_seconds: { type: number, minimum: 0 }
        trim_end_seconds: { type: number, minimum: 0 }
        metadata:
          type: object
          additionalProperties: { type: string }
    BatchRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            format: uri
    JobStatus:
      type: string
      enum: [queued, fetching, processing, tagging, completed, failed, canceled]
