openapi: 3.1.0
info:
  title: Music Parser API Contract
  version: 1.0.0
  description: Contract for job lifecycle, progress visibility, and result retrieval.
servers:
  - url: http://localhost:8000
paths:
  /api/v1/jobs:
    post:
      summary: Create a new parse job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateJobResponse'
  /api/v1/jobs/{jobId}:
    get:
      summary: Get job status and progress
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Current job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusResponse'
        '404':
          description: Job not found
  /api/v1/jobs/{jobId}/events:
    get:
      summary: Stream progress events via SSE
      operationId: streamJobEvents
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Text event stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/jobs/{jobId}/result:
    get:
      summary: Fetch final result details for completed job
      operationId: getJobResult
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Result payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultResponse'
        '404':
          description: Result not available
  /api/v1/history:
    get:
      summary: List recent job summaries
      operationId: getHistory
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recent jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryEntry'
components:
  parameters:
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateJobRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        trim:
          $ref: '#/components/schemas/TrimRange'
        metadata:
          $ref: '#/components/schemas/MetadataInput'
    CreateJobResponse:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
    JobStatusResponse:
      type: object
      required: [jobId, status, progressPercent, statusMessage]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        statusMessage:
          type: string
        updatedAt:
          type: string
          format: date-time
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ResultResponse:
      type: object
      required: [jobId, status, output]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [completed]
        output:
          $ref: '#/components/schemas/OutputArtifact'
    HistoryEntry:
      type: object
      required: [jobId, status, summary, updatedAt]
      properties:
        jobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
    TrimRange:
      type: object
      properties:
        startSeconds:
          type: number
          minimum: 0
        endSeconds:
          type: number
          minimum: 0
    MetadataInput:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        album:
          type: string
    OutputArtifact:
      type: object
      required: [filename, format, sizeBytes, downloadUrl]
      properties:
        filename:
          type: string
        format:
          type: string
          enum: [mp3]
        sizeBytes:
          type: integer
          minimum: 1
        downloadUrl:
          type: string
          format: uri
    ErrorPayload:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    JobStatus:
      type: string
      enum: [queued, fetching, processing, tagging, completed, failed, canceled]
