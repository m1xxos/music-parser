services:
  music-parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-parser:latest
    container_name: music-parser
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - OUTPUT_DIR=${OUTPUT_DIR:-/music}
    volumes:
      - music:/music
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 512M
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - music-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  music:
    name: music

networks:
  music-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
