<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Parser</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
    }
    .logo-icon svg { width: 40px; height: 40px; fill: white; }
    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }

    /* Main card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* URL Input */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .url-input {
      width: 100%;
      padding: 18px 20px 18px 52px;
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }
    .url-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    .url-input::placeholder { color: var(--text-muted); }
    .url-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .url-icon svg { width: 22px; height: 22px; }

    /* Options toggle */
    .options-toggle {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .options-btn {
      background: transparent;
      border: none;
      color: var(--primary-light);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .options-btn:hover { background: rgba(99, 102, 241, 0.15); }
    .options-btn svg { width: 18px; height: 18px; }

    /* Options panel */
    .options-panel {
      display: none;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s;
    }
    .options-panel.open {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Waveform */
    .waveform-box {
      background: linear-gradient(180deg, var(--surface-2), var(--surface));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }
    .scrub-preview {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: none;
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .scrub-preview.show { display: block; }
    .scrub-preview img {
      width: 180px;
      height: 101px;
      object-fit: cover;
      display: block;
    }
    .scrub-time {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .waveform-canvas {
      width: 100%;
      height: 90px;
      display: block;
      cursor: pointer;
      border-radius: 6px;
    }
    .waveform-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 12px;
    }
    .play-btn {
      background: var(--primary);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .play-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.08);
    }
    .play-btn:disabled {
      background: var(--surface-2);
      cursor: not-allowed;
      opacity: 0.4;
    }
    .play-btn svg { width: 18px; height: 18px; fill: white; }
    .time-badge {
      background: var(--surface-2);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 70px;
      text-align: center;
    }
    .waveform-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* Section labels */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px;
    }

    /* Inputs */
    .time-inputs, .metadata-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .time-field, .meta-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .meta-field.full-width { grid-column: span 2; }
    .time-field label, .meta-field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .time-field input, .meta-field input {
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .time-field input:focus, .meta-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* Download button */
    .download-btn {
      width: 100%;
      padding: 16px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 28px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }
    .download-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
      transform: translateY(-1px);
    }
    .download-btn:active { transform: translateY(0); }
    .download-btn:disabled {
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Status */
    .status {
      display: none;
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      text-align: center;
      font-weight: 500;
    }
    .status.show { display: block; animation: slideIn 0.3s; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .status.pending, .status.downloading {
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary-light);
      border: 1px solid rgba(99, 102, 241, 0.3);
    }
    .status.done {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .status.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    footer a { color: var(--primary-light); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <h1>Music Parser</h1>
    <p>Download and trim audio from YouTube</p>
  </div>

  <div class="card">
    <div class="input-group">
      <span class="url-icon">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      </span>
      <input class="url-input" id="url" type="url" placeholder="Paste YouTube URL..." autocomplete="off" />
    </div>

    <div class="options-toggle">
      <button class="options-btn" id="optionsToggleBtn" onclick="toggleOptions()">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Trim & Metadata
      </button>
    </div>

    <div class="options-panel" id="optionsPanel">
      <div class="waveform-box">
        <div class="scrub-preview" id="scrubPreview">
          <img id="scrubThumbnail" src="" alt="Preview" />
          <div class="scrub-time" id="scrubTime">0:00</div>
        </div>
        <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
        <div class="waveform-controls">
          <span class="time-badge" id="startTimeDisplay">0:00</span>
          <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled title="Play 30s preview">
            <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <span class="time-badge" id="endTimeDisplay">0:00</span>
        </div>
        <div class="waveform-hint">Drag handles or click to set trim points</div>
      </div>

      <div class="section-label">Trim Times</div>
      <div class="time-inputs">
        <div class="time-field">
          <label>Start Time</label>
          <input id="startTime" type="text" placeholder="1:30" />
        </div>
        <div class="time-field">
          <label>End Time</label>
          <input id="endTime" type="text" placeholder="4:00" />
        </div>
      </div>

      <div class="section-label">Metadata</div>
      <div class="metadata-inputs">
        <div class="meta-field">
          <label>Title</label>
          <input id="metaTitle" type="text" placeholder="Track title" />
        </div>
        <div class="meta-field">
          <label>Artist</label>
          <input id="metaArtist" type="text" placeholder="Artist name" />
        </div>
        <div class="meta-field full-width">
          <label>Album</label>
          <input id="metaAlbum" type="text" placeholder="Album name" />
        </div>
      </div>
    </div>

    <button class="download-btn" id="downloadBtn" onclick="startDownload()">Download</button>
    <div class="status" id="status"></div>
  </div>

  <footer>
    Saves to your Navidrome music folder · 
    <a href="https://github.com/yt-dlp/yt-dlp/blob/master/supportedsites.md" target="_blank">1000+ supported sites</a>
  </footer>

  <script src="app.js?v=1"></script>
</body>
</html>
