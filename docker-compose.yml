services:
  downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navidrome-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OUTPUT_ROOT: /data/music
      TMP_ROOT: /data/tmp
      DEFAULT_AUDIO_FORMAT: mp3
      DEFAULT_AUDIO_QUALITY: "320"
      HTTP_TIMEOUT_SECONDS: "20"
      NAVIDROME_SCAN_URL: ""
      NAVIDROME_SCAN_TOKEN: ""
      NAVIDROME_SCAN_HEADER: Authorization
    volumes:
      - ./data/music:/data/music
      - ./data/tmp:/data/tmp
    depends_on:
      - navidrome

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "4533:4533"
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_SCANINTERVAL: 1m
      ND_LOGLEVEL: info
    volumes:
      - ./data/navidrome:/data
      - ./data/music:/music:ro
